# ============================================================================
# IPSSI_APOCAL_KIT — pre-commit hooks
# ----------------------------------------------------------------------------
# Installation (une seule fois) :
#   pip install pre-commit
#   pre-commit install
#
# Les hooks s'exécutent automatiquement avant chaque git commit.
# Pour les lancer manuellement sur tous les fichiers :
#   pre-commit run --all-files
# ============================================================================

repos:
  # --- Black : formatter Python ---
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^backend/
        language_version: python3.11

  # --- Ruff : linter Python rapide ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        files: ^backend/
        args: [--fix, --exit-non-zero-on-fix]

  # --- Hooks utilitaires standards ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # --- Prettier : formatter JS/TS/JSON/CSS ---
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css|md)$
        additional_dependencies:
          - prettier@3.3.3

  # --- Conventional Commits (vérifie le format du message de commit) ---
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
